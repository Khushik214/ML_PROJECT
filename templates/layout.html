<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardioAI | Wellness & Prevention</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <!-- Background Visuals -->
    <div class="bg-visuals">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
    </div>

    <!-- Header -->
    <header class="main-header">
        <div class="header-container">
            <a href="{{ url_for('home') }}" class="logo">
                <svg class="heart-icon" viewBox="0 0 24 24">
                    <path
                        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                </svg>
                <span>CardioAI</span>
            </a>

            <nav class="main-nav">
                <a href="{{ url_for('home') }}" class="nav-link">Dashboard</a>
                <a href="{{ url_for('prediction_page') }}" class="nav-link">Prediction</a>
                <a href="{{ url_for('analytics') }}" class="nav-link">Analytics</a>
                <a href="{{ url_for('about') }}" class="nav-link">About</a>
            </nav>

            <div class="nav-actions">
                <a href="{{ url_for('prediction_page') }}" class="predict-cta">Predict Now</a>
                <button id="themeToggle" class="theme-toggle" aria-label="Toggle Dark Mode">
                    <span class="icon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <div class="main-wrapper">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="footer-grid">
            <div class="footer-col">
                <h4>Support</h4>
                <a href="{{ url_for('transparency') }}">Transparency</a>
                <a href="{{ url_for('caution') }}">Caution</a>
            </div>
            <div class="footer-col">
                <h4>Health</h4>
                <a href="{{ url_for('guidance') }}">Guidance</a>
                <a href="#">Resources</a>
            </div>
        </div>
        <p class="copyright">&copy; @2026 CardioAI Wellness. Educational Platform.</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
